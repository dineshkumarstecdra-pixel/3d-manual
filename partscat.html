<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARTS CATALOGUE</title>
  <link rel="icon" href="/images/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/src/home.css">
  <script>document.documentElement.classList.add("auth-checking");</script>
  <style>html.auth-checking body > *{visibility:hidden!important}</style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <a href="home.html"><img src="/images/icons/icon.svg" alt="logo"></a>
    </div>
    <nav class="nav">
      <a href="partscat.html" class="active" style="color:#2f80ed;">Parts Catalogue</a>
      <a href="serviceman.html">Service Manual</a>
    </nav>
    <div class="region-selector">
      <img src="/images/worldwide.png" alt="world" class="world-icon">
      <select id="regionSelect"><option value="">All Regions</option></select>
    </div>
    <div class="profile" id="profileMenu">
      <span class="icon"><img src="/images/icons/profile.png" alt="Profile"></span>
      <div class="profile-dropdown" id="profileDropdown"><button id="logoutBtn">Logout</button></div>
    </div>
  </header>

  <main class="container">
    <h1>Select Vehicle</h1>
    <div class="selectors">
      <div class="select-box"><select id="typeSelect"><option value="">Select the Type</option></select></div>
      <div class="select-box"><select id="modelSelect"><option value="">Select the series</option></select></div>
      <button id="resetFilter" type="button">Reset</button>
    </div>
    <section class="section">
      <h2>All Vehicles</h2>
      <div class="vehicle-grid"></div>
    </section>
  </main>

  <script type="module" src="/src/partscat.js"></script>
</body>
</html>
