<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="./src/admin.css">
</head>

<body class="vehicle-page">

<div class="layout">

  <!-- 🔥 SIDEBAR -->
  <div class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
      <li onclick="showSection('upload')">Upload Vehicle</li>
      <li onclick="showSection('list')">Manage Vehicles</li>
    </ul>
  </div>

  <!-- 🔥 CONTENT -->
  <div class="content">

    <!-- UPLOAD SECTION -->
    <div id="uploadSection">
      <h2>Upload Vehicle</h2>

      <form id="uploadForm">

        <input type="text" id="name" placeholder="Vehicle Name" required>

        <select id="type">
          <option value="suv">SUV</option>
          <option value="sedan">SEDAN</option>
          <option value="coupe">COUPE</option>
        </select>

        <select id="series">
          <option value="m">M</option>
          <option value="x">X</option>
          <option value="i">I</option>
          <option value="r">R</option>
          <option value="z">Z</option>
        </select>

        <input type="file" id="image" required>
        <input type="file" id="model" required>

        <!-- 🔥 Progress -->
        <progress id="progressBar" value="0" max="100"></progress>

        <button type="submit">Upload</button>
      </form>
    </div>

    <!-- VEHICLE LIST -->
    <div id="listSection" style="display:none;">
      <h2>All Vehicles</h2>
      <div id="vehicleList"></div>
    </div>

  </div>
</div>

<script type="module" src="./src/admin.js"></script>
</body>
</html>
