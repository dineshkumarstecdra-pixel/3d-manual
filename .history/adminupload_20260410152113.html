<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .layout-border { border: 4px solid #4f46e5; }
        .thick-border { border: 4px solid #000; }
        .form-border { border: 2px solid #000; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans bg-white overflow-hidden">

    <header class="flex items-center justify-between px-4 py-3 bg-white layout-border border-b-0">
        <div class="flex items-center gap-6 w-full max-w-4xl">
            <span class="font-bold text-lg">logo</span>
            <div class="flex items-center gap-4 flex-1">
                <input type="text" placeholder="Search the vehicle ..." class="w-full p-2 thick-border text-blue-700 outline-none">
                <span class="font-medium">Search</span>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <button class="px-10 py-1 border-2 border-blue-600 rounded-full text-blue-600 font-semibold hover:bg-blue-50">Upload</button>
            <div class="flex flex-col items-center text-blue-700 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 fill-current" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                <span class="text-xs font-bold mt-1">Profile</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden layout-border bg-white">
        
        <aside class="w-64 border-r-4 border-blue-600 p-6 flex flex-col gap-3">
            <a href="home.html" class="text-blue-700 hover:underline inline-block w-max">Home</a>
            <a href="upload.html" class="bg-black text-white font-bold inline-block px-2 py-0.5 w-max">Upload</a>
            <a href="edit.html" class="text-blue-700 hover:underline inline-block w-max">Edit</a>
            <a href="#" class="text-blue-700 hover:underline inline-block w-max">Manage the vehicle</a>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            <h1 class="text-xl font-bold mb-6">Update the Details</h1>
            
            <form class="max-w-2xl flex flex-col gap-6">
                <div class="form-border p-3 flex items-center">
                    <input type="text" placeholder="Enter the model name" class="w-full outline-none font-bold placeholder-black text-lg">
                </div>

                <div class="form-border p-2 px-3 flex items-center justify-between">
                    <span class="font-bold text-lg">Upload the Model data</span>
                    <button type="button" class="bg-black text-white px-8 py-1 font-bold rounded-sm">Upload</button>
                </div>

                <div class="form-border p-2 px-3 flex items-center justify-between">
                    <span class="font-bold text-lg">Upload the Model Image</span>
                    <button type="button" class="bg-black text-white px-8 py-1 font-bold rounded-sm">Upload</button>
                </div>

                <div class="form-border p-2 px-3 flex items-center justify-between">
                    <span class="font-bold text-lg">Upload Model glTF file</span>
                    <button type="button" class="bg-black text-white px-8 py-1 font-bold rounded-sm">Upload</button>
                </div>

                <button type="submit" class="bg-black text-white text-4xl font-bold py-4 px-12 rounded-full w-max mt-4 hover:bg-gray-800 transition-colors">Submit</button>
            </form>
        </main>
    </div>
</body>
</html>
